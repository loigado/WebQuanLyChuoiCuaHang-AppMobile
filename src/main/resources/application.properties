# ==============================================================
# 1. THÔNG TIN ỨNG DỤNG
# ==============================================================
spring.application.name=DoAnTotNghiep
server.port=8081
server.servlet.context-path=

# ==============================================================
# 2. CẤU HÌNH KẾT NỐI SQL SERVER (HIKARI CONNECTION POOL)
# ==============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BranchManagement;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Tối ưu Connection Pool (Giúp ứng dụng chạy mượt, không bị treo kết nối)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ==============================================================
# 3. CẤU HÌNH JPA / HIBERNATE
# ==============================================================
# QUAN TRỌNG: Giữ nguyên tên bảng/cột như trong @Table và @Column (Fix lỗi bị chuyển về viết thường)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Dialect chuẩn cho các phiên bản SQL Server mới nhất
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

# Hiển thị SQL ra Console để Debug (Tắt khi chạy thực tế - Production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Tối ưu hóa xử lý Batch (Tăng tốc khi insert nhiều dữ liệu như Import Excel)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==============================================================
# 4. CẤU HÌNH JACKSON (XỬ LÝ JSON)
# ==============================================================
# Tránh lỗi "ByteBuddyInterceptor" khi gặp Lazy Loading
spring.jackson.serialization.fail-on-empty-beans=false
# Định dạng ngày tháng chuẩn ISO cho Frontend Vue.js dễ đọc
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ==============================================================
# 5. CẤU HÌNH LOGGING
# ==============================================================
logging.level.root=INFO
# Log chi tiết các câu lệnh SQL để theo dõi tại sao bảng bị trống
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
media.hls.url=http://localhost:8888

spring.jpa.properties.hibernate.connection.CharSet=utf-8
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# ==============================================================
# 6. CẤU HÌNH REDIS CACHING (ĐÃ VÔ HIỆU HÓA ĐỂ CHẠY LOCAL KHÔNG CẦN CÀI REDIS)
# ==============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
spring.cache.type=none

# Thiết lập múi giờ Việt Nam
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB